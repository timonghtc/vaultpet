name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ https://peagvjqnmjllqerqcuzs.supabase.co }}
          VITE_SUPABASE_ANON_KEY: ${{ sb_publishable_igI-rBKs2IBwyCgfc7CpJg_W2lw_KZX }}
          VITE_ADMIN_PASSWORD: ${{ Boss }}
          VITE_ADMIN_EMAIL: ${{ bombini@gmail.com }}
      - run: echo petvault.us > dist/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
